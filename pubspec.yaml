name: wheels_doc
description: "A new Flutter clean architecture project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.0

  # Dependency Injection
  get_it: ^7.6.0

  # Routing
  go_router: ^14.0.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  drag_and_drop_lists: ^0.4.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  dartz: ^0.10.1
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^9.1.5
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/sounds/
